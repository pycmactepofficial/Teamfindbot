<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Find</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* твой старый CSS, оставь как есть */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0b0c10;
            color: #e0e0e0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1f2833;
            border-bottom: 2px solid #45a29e;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #45a29e;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: #0b0c10;
            border: none;
            color: #c5c6c7;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .tab:hover {
            background: #1f2833;
        }

        .tab.active {
            background: #1f2833;
            color: #66fcf1;
            border-bottom: 3px solid #00ffff;
            margin-bottom: -1px;
        }

        .container {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            background: #1f2833;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #45a29e;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1 1 180px;
        }

        .filter-group label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #66fcf1;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0b0c10;
            border: 2px solid #45a29e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 8px #66fcf1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1f2833;
            border-radius: 12px;
            padding: 18px;
            border: 2px solid #45a29e;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 252, 241, 0.25);
            border-color: #66fcf1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
        }

        .card-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            background: #0b0c10;
            color: #66fcf1;
            border: 1px solid #66fcf1;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .card-game {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            color: #c5c6c7;
            font-size: 0.95rem;
        }

        .card-details {
            margin: 10px 0;
            font-size: 0.9rem;
            color: #b0b0b0;
            line-height: 1.4;
        }

        .card-details span {
            color: #66fcf1;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #66fcf1;
            font-size: 0.85rem;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: transparent;
            color: #66fcf1;
        }

        .btn-primary:hover {
            background: #66fcf1;
            color: #0b0c10;
        }

        .btn-danger {
            background: transparent;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .btn-danger:hover {
            background: #ff6b6b;
            color: #fff;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            font-size: 1.2rem;
            color: #45a29e;
        }

        .form-section {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #66fcf1;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #0b0c10;
            border: 2px solid #45a29e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 10px #66fcf1;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #66fcf1, #00ffff);
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 252, 241, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1f2833;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #45a29e;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #fff;
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #66fcf1;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-btn {
            padding: 12px;
            border: 2px solid #45a29e;
            background: #0b0c10;
            color: #c5c6c7;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .type-btn.active {
            background: #66fcf1;
            border-color: #66fcf1;
            color: #0b0c10;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎮 TEAM FIND</h1>
        <div class="tabs">
            <button class="tab active" onclick="switchTab(event, 'search')">🔍 Поиск</button>
            <button class="tab" onclick="switchTab(event, 'my-profiles')">📝 Мои анкеты</button>
            <button class="tab" onclick="switchTab(event, 'create')">➕ Создать</button>
        </div>
    </div>

    <div class="container">
        <div id="search" class="tab-content active">
            <div class="filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🎮 Игра</label>
                        <select id="gameFilter">
                            <option value="all">Все игры</option>
                            <option value="CS2">CS2</option>
                            <option value="Valorant">Valorant</option>
                            <option value="Dota 2">Dota 2</option>
                            <option value="Fortnite">Fortnite</option>
                            <option value="LoL">League of Legends</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🔍 Тип</label>
                        <select id="typeFilter">
                            <option value="all">Все</option>
                            <option value="player">Игроки</option>
                            <option value="team">Команды</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🏆 Поиск</label>
                        <input type="text" id="searchText" placeholder="Роль, ранг, имя...">
                    </div>
                </div>
            </div>
            <div id="cardsContainer" class="cards-grid"></div>
        </div>

        <div id="my-profiles" class="tab-content">
            <div id="myProfilesContainer" class="cards-grid"></div>
        </div>

        <div id="create" class="tab-content">
            <div class="form-section">
                <h2 style="color: #fff; margin-bottom: 20px; text-align: center;">Добавить новую анкету</h2>
                <div class="type-selector">
                    <button class="type-btn active" onclick="selectType(event, 'player')">👤 Игрок</button>
                    <button class="type-btn" onclick="selectType(event, 'team')">👥 Команда</button>
                </div>
                <form id="regForm">
                    <div id="playerFields">
                        <div class="form-group">
                            <label>Ник</label>
                            <input type="text" id="regName" placeholder="Ваш игровой ник" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Игра</label>
                                <select id="regGame"></select>
                            </div>
                            <div class="form-group">
                                <label>Роль</label>
                                <select id="regRole"></select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Ранг</label>
                                <select id="regRank"></select>
                            </div>
                        </div>
                    </div>
                    <div id="teamFields" style="display: none;">
                        <div class="form-group">
                            <label>Название команды</label>
                            <input type="text" id="teamName" placeholder="Название команды" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Игра</label>
                                <select id="teamGame"></select>
                            </div>
                            <div class="form-group">
                                <label>Ранг/уровень</label>
                                <select id="teamRank"></select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Состав</label>
                                <input type="number" id="teamMembers" min="1" max="5" value="5">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <input type="text" id="regDesc" placeholder="Краткое описание (опционально)">
                    </div>
                    <button type="submit" class="btn-submit">Создать анкету</button>
                </form>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Редактировать анкету</h2>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editProfileId">
                <div class="form-group">
                    <label>Ник</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <input type="text" id="editDesc">
                </div>
                <div class="form-group">
                    <label>Ранг</label>
                    <input type="text" id="editRank">
                </div>
                <button type="submit" class="btn-submit">Сохранить</button>
            </form>
        </div>
    </div>

    <script>
        // ===== ДАННЫЕ =====
        const gameData = {
            'CS2': { roles: ['AWPer', 'Rifler', 'IGL', 'Support', 'Lurker'], ranks: ['Silver', 'Gold', 'Master Guardian', 'Distinguished Master Guardian', 'Legendary Eagle', 'Supreme', 'Global Elite'] },
            'Valorant': { roles: ['Duelist', 'Controller', 'Initiator', 'Sentinel'], ranks: ['Iron', 'Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Ascendant', 'Immortal', 'Radiant'] },
            'Dota 2': { roles: ['Carry', 'Mid', 'Offlane', 'Support', 'Hard Support'], ranks: ['Herald', 'Guardian', 'Crusader', 'Archon', 'Legend', 'Ancient', 'Divine', 'Immortal'] },
            'Fortnite': { roles: ['Builder', 'Shooter', 'Flex'], ranks: ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Elite', 'Champion', 'Unreal'] },
            'LoL': { roles: ['Top', 'Jungle', 'Mid', 'ADC', 'Support'], ranks: ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Master', 'Grandmaster', 'Challenger'] }
        };

        let currentUserId = null;
        let currentType = 'player';

        // ===== ПОЛУЧЕНИЕ ID =====
        function initUserId() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                currentUserId = tg.initDataUnsafe?.user?.id;
                if (currentUserId) {
                    alert(`✅ ID получен: ${currentUserId}`);
                } else {
                    alert('⚠️ Не удалось получить ID из Telegram. Работаем в тестовом режиме?');
                    currentUserId = 123456789; // заглушка для теста
                }
            } else {
                alert('⚠️ Запущено вне Telegram. Используем тестовый ID.');
                currentUserId = 123456789;
            }
        }

        // ===== ИНИЦИАЛИЗАЦИЯ ФОРМ =====
        function initializeFormFields() {
            const defaultGame = 'CS2';
            updateRoleOptions(defaultGame, 'regRole');
            updateRankOptions(defaultGame, 'regRank');
            updateRankOptions(defaultGame, 'teamRank');

            const regGame = document.getElementById('regGame');
            regGame.innerHTML = '';
            for (let g in gameData) {
                let opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                regGame.appendChild(opt);
            }
            regGame.value = defaultGame;
            regGame.addEventListener('change', (e) => {
                updateRoleOptions(e.target.value, 'regRole');
                updateRankOptions(e.target.value, 'regRank');
            });

            const teamGame = document.getElementById('teamGame');
            teamGame.innerHTML = '';
            for (let g in gameData) {
                let opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                teamGame.appendChild(opt);
            }
            teamGame.value = defaultGame;
            teamGame.addEventListener('change', (e) => {
                updateRankOptions(e.target.value, 'teamRank');
            });

            document.getElementById('gameFilter').addEventListener('change', loadSearch);
            document.getElementById('typeFilter').addEventListener('change', loadSearch);
            document.getElementById('searchText').addEventListener('input', loadSearch);
            document.getElementById('regForm').addEventListener('submit', registerProfile);
            document.getElementById('editForm').addEventListener('submit', updateProfile);
        }

        function updateRoleOptions(game, selectId) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            gameData[game].roles.forEach(role => {
                const option = document.createElement('option');
                option.value = role;
                option.textContent = role;
                select.appendChild(option);
            });
        }

        function updateRankOptions(game, selectId) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            gameData[game].ranks.forEach(rank => {
                const option = document.createElement('option');
                option.value = rank;
                option.textContent = rank;
                select.appendChild(option);
            });
        }

        // ===== ВКЛАДКИ =====
        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (e) e.target.classList.add('active');
            if (tabName === 'my-profiles') loadMyProfiles();
            else if (tabName === 'search') loadSearch();
        }

        // ===== ВЫБОР ТИПА =====
        function selectType(e, type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            
            const playerFields = document.getElementById('playerFields');
            const teamFields = document.getElementById('teamFields');
            const regName = document.getElementById('regName');
            const teamName = document.getElementById('teamName');
            
            if (type === 'player') {
                playerFields.style.display = 'block';
                teamFields.style.display = 'none';
                regName.required = true;      // Ник игрока обязателен
                teamName.required = false;    // Название команды необязательно
                teamName.value = '';          // Очищаем скрытое поле
            } else {
                playerFields.style.display = 'none';
                teamFields.style.display = 'block';
                regName.required = false;     // Ник игрока необязателен
                teamName.required = true;     // Название команды обязательно
                regName.value = '';           // Очищаем скрытое поле
            }
        }

        // ===== ЗАГРУЗКА ПОИСКА =====
        async function loadSearch() {
            const game = document.getElementById('gameFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchText').value;
            try {
                const response = await fetch(`/api/data?game=${encodeURIComponent(game)}&type_filter=${encodeURIComponent(type)}&search=${encodeURIComponent(search)}`);
                const data = await response.json();
                const container = document.getElementById('cardsContainer');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="no-results">❌ Никого не найдено</div>';
                    return;
                }
                container.innerHTML = data.map(item => createCard(item, false)).join('');
            } catch (error) {
                alert('Ошибка загрузки поиска: ' + error.message);
            }
        }

        async function loadMyProfiles() {
            const profiles = await getProfilesFromCloud();
            const container = document.getElementById('myProfilesContainer');
            
            if (!profiles || profiles.length === 0) {
                container.innerHTML = '<div class="no-results">📭 У вас нет анкет. Создайте первую!</div>';
                return;
            }
            
            // Отображаем анкеты
            container.innerHTML = profiles.map(profile => createCard(profile, true)).join('');
        }

        function createCard(item, isOwn) {
            const isPlayer = item.type === 'player';
            const typeLabel = isPlayer ? '👤 ИГРОК' : '👥 КОМАНДА';
            const gameIcon = { 'CS2': '🎯', 'Valorant': '🔫', 'Dota 2': '⚔️', 'Fortnite': '🛸', 'LoL': '🏆' }[item.game] || '🎮';
            let details = isPlayer ? `<div><span>Роль:</span> ${item.role || 'N/A'}</div><div><span>Ранг:</span> ${item.rank}</div>` : `<div><span>Ранг:</span> ${item.rank}</div>`;
            let actions = '';
            if (isOwn) {
                actions = `
                    <button class="btn btn-primary" onclick="openEditModal(${item.id}, '${item.name.replace(/'/g, "\\'")}', '${(item.description || '').replace(/'/g, "\\'")}', '${item.rank.replace(/'/g, "\\'")}')">✏️ Редактировать</button>
                    <button class="btn btn-danger" onclick="deleteProfile(${item.id})">🗑️ Удалить</button>
                `;
            } else {
                actions = `<button class="btn btn-primary" onclick="alert('Функция чата в разработке')">💬 Написать</button>`;
            }
            return `
                <div class="card">
                    <div class="card-type">${typeLabel}</div>
                    <div class="card-title">${item.name}</div>
                    <div class="card-game">${gameIcon} ${item.game}</div>
                    <div class="card-details">${details}<div style="margin-top:8px;"><span>Описание:</span> ${item.description || 'Нет описания'}</div></div>
                    <div class="card-actions">${actions}</div>
                </div>
            `;
        }

        // Функция для сохранения анкеты
        async function saveProfileToCloud(profile) {
            if (!window.Telegram.WebApp) return false;
            try {
                let profiles = await getProfilesFromCloud();
                if (!profiles) profiles = [];
                
                // Добавляем ID и дату
                profile.id = Date.now();
                profile.createdAt = new Date().toISOString();
                profiles.push(profile);
                
                const profilesJson = JSON.stringify(profiles);
                return new Promise((resolve) => {
                    window.Telegram.WebApp.CloudStorage.setItem('user_profiles', profilesJson, (success) => {
                        resolve(success);
                    });
                });
            } catch(e) {
                console.error('CloudStorage save error:', e);
                return false;
            }
        }

        // Функция для загрузки анкет
        async function getProfilesFromCloud() {
            if (!window.Telegram.WebApp) return [];
            return new Promise((resolve) => {
                window.Telegram.WebApp.CloudStorage.getItem('user_profiles', (err, value) => {
                    if (err || !value) return resolve([]);
                    try {
                        resolve(JSON.parse(value));
                    } catch(e) {
                        resolve([]);
                    }
                });
            });
        }

        // ===== РЕГИСТРАЦИЯ (основное) =====
        async function registerProfile(e) {
            e.preventDefault();
            
            if (!currentUserId) {
                alert('❌ Ошибка: не удалось определить ID пользователя. Откройте через Telegram.');
                return;
            }

            let data;
            if (currentType === 'player') {
                const name = document.getElementById('regName').value;
                if (!name) { alert('Введите ник игрока'); return; }
                data = {
                    user_id: currentUserId,
                    type: 'player',
                    name: name,
                    game: document.getElementById('regGame').value,
                    role: document.getElementById('regRole').value,
                    rank: document.getElementById('regRank').value,
                    description: document.getElementById('regDesc').value
                };
                const saved = await saveProfileToCloud(data);
                if (saved) {
                    alert('✅ Анкета создана!');
                    document.getElementById('regForm').reset();
                    await loadMyProfiles(); // Обновляем список
                } else {
                    alert('❌ Ошибка при сохранении');
                }
            } else {
                const name = document.getElementById('teamName').value;
                if (!name) { alert('Введите название команды'); return; }
                data = {
                    user_id: currentUserId,
                    type: 'team',
                    name: name,
                    game: document.getElementById('teamGame').value,
                    rank: document.getElementById('teamRank').value,
                    members: parseInt(document.getElementById('teamMembers').value),
                    description: document.getElementById('regDesc').value
                };
                const saved = await saveProfileToCloud(data);
                if (saved) {
                    alert('✅ Анкета создана!');
                    document.getElementById('regForm').reset();
                    await loadMyProfiles(); // Обновляем список
                } else {
                    alert('❌ Ошибка при сохранении');
                }
            }

        }

        // ===== РЕДАКТИРОВАНИЕ =====
        function openEditModal(profileId, name, description, rank) {
            document.getElementById('editProfileId').value = profileId;
            document.getElementById('editName').value = name;
            document.getElementById('editDesc').value = description;
            document.getElementById('editRank').value = rank;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function updateProfile(e) {
            e.preventDefault();
            const profileId = document.getElementById('editProfileId').value;
            const data = {
                user_id: currentUserId,
                name: document.getElementById('editName').value,
                rank: document.getElementById('editRank').value,
                description: document.getElementById('editDesc').value
            };
            try {
                const response = await fetch(`/api/profile/${profileId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert('✅ Анкета обновлена!');
                    closeEditModal();
                    loadMyProfiles();
                } else {
                    alert('❌ Ошибка обновления');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function deleteProfile(profileId) {
            if (!confirm('Удалить анкету?')) return;
            try {
                const response = await fetch(`/api/profile/${profileId}?user_id=${currentUserId}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('✅ Удалено');
                    loadMyProfiles();
                } else {
                    alert('❌ Ошибка удаления');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        // ===== СТАРТ =====
        document.addEventListener('DOMContentLoaded', () => {
            initUserId();
            initializeFormFields();
            // Устанавливаем начальный тип "player" и корректные required
            const defaultTabBtn = document.querySelector('.type-btn.active');
            if (defaultTabBtn) {
                selectType({ target: defaultTabBtn }, 'player');
            } else {
                selectType({ target: document.querySelector('.type-btn') }, 'player');
            }
            loadSearch();
        });

        // закрыть модалку по клику на фон
        document.addEventListener('click', (e) => {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        });
    </script>
    <script>
    (function() {
        // Принудительно заставляем поля работать
        const allInputs = document.querySelectorAll('input, textarea, select');
        allInputs.forEach(el => {
            el.addEventListener('touchstart', (e) => {
                // Без этого на iOS иногда не срабатывает
                e.stopPropagation();
                el.focus();
            });
            el.addEventListener('click', (e) => {
                el.focus();
            });
        });
        
        // На случай, если поле перекрыто клавиатурой - скроллим
        const originalFocus = HTMLElement.prototype.focus;
        HTMLElement.prototype.focus = function() {
            originalFocus.apply(this, arguments);
            setTimeout(() => {
                this.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        };
    })();
    </script>
    <script>
        // Это решит проблему с клавиатурой
        function onInputFocus(event) {
            const element = event.target;
            setTimeout(() => {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        document.querySelectorAll('input, select, textarea').forEach(input => {
            input.addEventListener('focus', onInputFocus);
        });
    </script>
</body>
