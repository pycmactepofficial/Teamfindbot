<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Team Find</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Твои старые стили, оставь как есть (я их сократил для краткости, но ты можешь вставить свои полные) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0c10;
            color: #e0e0e0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1f2833;
            border-bottom: 2px solid #45a29e;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #45a29e;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: #0b0c10;
            border: none;
            color: #c5c6c7;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .tab:hover {
            background: #1f2833;
        }

        .tab.active {
            background: #1f2833;
            color: #66fcf1;
            border-bottom: 3px solid #00ffff;
            margin-bottom: -1px;
        }

        .container {
            flex: 1;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            background: #1f2833;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #45a29e;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1 1 180px;
        }

        .filter-group label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #66fcf1;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0b0c10;
            border: 2px solid #45a29e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 8px #66fcf1;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1f2833;
            border-radius: 12px;
            padding: 18px;
            border: 2px solid #45a29e;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 252, 241, 0.25);
            border-color: #66fcf1;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
        }

        .card-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            background: #0b0c10;
            color: #66fcf1;
            border: 1px solid #66fcf1;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .card-game {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            color: #c5c6c7;
            font-size: 0.95rem;
        }

        .card-details {
            margin: 10px 0;
            font-size: 0.9rem;
            color: #b0b0b0;
            line-height: 1.4;
        }

        .card-details span {
            color: #66fcf1;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #66fcf1;
            font-size: 0.85rem;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: transparent;
            color: #66fcf1;
        }

        .btn-primary:hover {
            background: #66fcf1;
            color: #0b0c10;
        }

        .btn-danger {
            background: transparent;
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .btn-danger:hover {
            background: #ff6b6b;
            color: #fff;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            font-size: 1.2rem;
            color: #45a29e;
        }

        .form-section {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #66fcf1;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #0b0c10;
            border: 2px solid #45a29e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 10px #66fcf1;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #66fcf1, #00ffff);
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 252, 241, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1f2833;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #45a29e;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #fff;
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #66fcf1;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-btn {
            padding: 12px;
            border: 2px solid #45a29e;
            background: #0b0c10;
            color: #c5c6c7;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .type-btn.active {
            background: #66fcf1;
            border-color: #66fcf1;
            color: #0b0c10;
        }

        .verification-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 12px;
            background: #0b0c10;
            border: 1px solid;
        }
        .verdict-clean {
            color: #2ecc71;
            border-color: #2ecc71;
        }
        .verdict-suspicious {
            color: #e74c3c;
            border-color: #e74c3c;
        }
        .verdict-not_checked {
            color: #95a5a6;
            border-color: #95a5a6;
        }
        .card-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .instruction-code {
            background: #0b0c10;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #45a29e;
            font-family: monospace;
            font-size: 0.9rem;
            color: #66fcf1;
            word-break: break-all;
            margin: 15px 0;
        }
        .download-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #66fcf1;
            color: #0b0c10;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #1f2833;
            border-radius: 16px;
            padding: 24px;
            border: 2px solid #45a29e;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #0b0c10;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 3px solid #66fcf1;
        }
        .profile-info h2 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .profile-info p {
            color: #c5c6c7;
            font-size: 1rem;
        }
        .verification-summary {
            background: #1f2833;
            border-radius: 16px;
            padding: 20px;
            border: 2px solid #45a29e;
            margin-bottom: 20px;
        }
        .verification-summary h3 {
            color: #66fcf1;
            margin-bottom: 15px;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .status-clean { background: #2ecc71; color: #0b0c10; }
        .status-suspicious { background: #e74c3c; color: #fff; }
        .status-not_checked { background: #95a5a6; color: #fff; }
        .profile-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .profile-actions .btn {
            flex: 0 1 auto;
            padding: 12px 24px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎮 TEAM FIND</h1>
        <div class="tabs">
            <button class="tab" onclick="switchTab(event, 'profile')">👤 Профиль</button>
            <button class="tab active" onclick="switchTab(event, 'search')">🔍 Поиск</button>
            <button class="tab" onclick="switchTab(event, 'my-profiles')">📝 Мои анкеты</button>
            <button class="tab" onclick="switchTab(event, 'create')">➕ Создать</button>
        </div>
    </div>

    <div class="container">
        <div id="profile" class="tab-content">
            <div class="profile-container">
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h2 id="profileName">Загрузка...</h2>
                        <p id="profileTelegramId">Telegram ID: <span id="profileUserIdSpan"></span></p>
                    </div>
                </div>

                <div class="verification-summary" id="verificationSummary">
                    <h3>🛡️ Статус верификации</h3>
                    <div id="verificationStatusBlock">Загрузка...</div>
                </div>

                <div class="profile-actions">
                    <button class="btn btn-primary" onclick="downloadChecker()">⬇️ Скачать чекер</button>
                    <button class="btn btn-primary" onclick="showCheckerInstruction()">📋 Инструкция</button>
                </div>

                <h3 style="margin: 20px 0 15px;">📋 Мои анкеты</h3>
                <div id="profileProfilesList" class="cards-grid"></div>
            </div>
        </div>
        <div id="search" class="tab-content active">
            <div class="filters">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🎮 Игра</label>
                        <select id="gameFilter">
                            <option value="all">Все игры</option>
                            <option value="CS2">CS2</option>
                            <option value="Valorant">Valorant</option>
                            <option value="Dota 2">Dota 2</option>
                            <option value="Fortnite">Fortnite</option>
                            <option value="LoL">League of Legends</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🔍 Тип</label>
                        <select id="typeFilter">
                            <option value="all">Все</option>
                            <option value="player">Игроки</option>
                            <option value="team">Команды</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🏆 Поиск</label>
                        <input type="text" id="searchText" placeholder="Роль, ранг, имя...">
                    </div>
                </div>
            </div>
            <div id="cardsContainer" class="cards-grid"></div>
        </div>

        <div id="my-profiles" class="tab-content">
            <div id="myProfilesContainer" class="cards-grid"></div>
        </div>

        <div id="create" class="tab-content">
            <div class="form-section">
                <h2 style="color: #fff; margin-bottom: 20px; text-align: center;">Добавить новую анкету</h2>
                <div class="type-selector">
                    <button class="type-btn active" onclick="selectType(event, 'player')">👤 Игрок</button>
                    <button class="type-btn" onclick="selectType(event, 'team')">👥 Команда</button>
                </div>
                <form id="regForm">
                    <div id="playerFields">
                        <div class="form-group">
                            <label>Ник</label>
                            <input type="text" id="regName" placeholder="Ваш игровой ник" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Игра</label>
                                <select id="regGame"></select>
                            </div>
                            <div class="form-group">
                                <label>Роль</label>
                                <select id="regRole"></select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Ранг</label>
                                <select id="regRank"></select>
                            </div>
                        </div>
                    </div>
                    <div id="teamFields" style="display: none;">
                        <div class="form-group">
                            <label>Название команды</label>
                            <input type="text" id="teamName" placeholder="Название команды" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Игра</label>
                                <select id="teamGame"></select>
                            </div>
                            <div class="form-group">
                                <label>Ранг/уровень</label>
                                <select id="teamRank"></select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Состав</label>
                                <input type="number" id="teamMembers" min="1" max="5" value="5">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <input type="text" id="regDesc" placeholder="Краткое описание (опционально)">
                    </div>
                    <button type="submit" class="btn-submit">Создать анкету</button>
                </form>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Редактировать анкету</h2>
                <button class="modal-close" onclick="closeEditModal()">×</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editProfileId">
                <div class="form-group">
                    <label>Ник</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <input type="text" id="editDesc">
                </div>
                <div class="form-group">
                    <label>Ранг</label>
                    <input type="text" id="editRank">
                </div>
                <button type="submit" class="btn-submit">Сохранить</button>
            </form>
        </div>
    </div>

    <script>
        // ===== ДАННЫЕ =====
        const gameData = {
            'CS2': { roles: ['AWPer', 'Rifler', 'IGL', 'Support', 'Lurker'], ranks: ['Silver', 'Gold', 'Master Guardian', 'Distinguished Master Guardian', 'Legendary Eagle', 'Supreme', 'Global Elite'] },
            'Valorant': { roles: ['Duelist', 'Controller', 'Initiator', 'Sentinel'], ranks: ['Iron', 'Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Ascendant', 'Immortal', 'Radiant'] },
            'Dota 2': { roles: ['Carry', 'Mid', 'Offlane', 'Support', 'Hard Support'], ranks: ['Herald', 'Guardian', 'Crusader', 'Archon', 'Legend', 'Ancient', 'Divine', 'Immortal'] },
            'Fortnite': { roles: ['Builder', 'Shooter', 'Flex'], ranks: ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Elite', 'Champion', 'Unreal'] },
            'LoL': { roles: ['Top', 'Jungle', 'Mid', 'ADC', 'Support'], ranks: ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Master', 'Grandmaster', 'Challenger'] }
        };

        let currentUserId = null;
        let currentType = 'player';

        // ===== ИНИЦИАЛИЗАЦИЯ ID =====
        function initUserId() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                const user = tg.initDataUnsafe?.user;
                if (user && user.id) {
                    currentUserId = user.id;
                    console.log('✅ ID пользователя (Telegram):', currentUserId);
                } else {
                    // Пробуем взять из URL (передаётся ботом)
                    const urlParams = new URLSearchParams(window.location.search);
                    const urlUserId = urlParams.get('user_id');
                    if (urlUserId) {
                        currentUserId = parseInt(urlUserId);
                        console.log('✅ ID пользователя (URL):', currentUserId);
                    } else {
                        console.warn('⚠️ ID не получен, используем тестовый 123');
                        currentUserId = 123;
                    }
                }
            } else {
                console.warn('⚠️ Не в Telegram, тестовый ID 123');
                currentUserId = 123;
            }
        }

        // ===== ЗАПОЛНЕНИЕ ВЫПАДАЮЩИХ СПИСКОВ =====
        function populateGames() {
            const regGame = document.getElementById('regGame');
            const teamGame = document.getElementById('teamGame');
            regGame.innerHTML = '';
            teamGame.innerHTML = '';
            for (let g in gameData) {
                let opt1 = new Option(g, g);
                let opt2 = new Option(g, g);
                regGame.appendChild(opt1);
                teamGame.appendChild(opt2);
            }
        }

        function updateRoleOptions(game, selectId) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            gameData[game].roles.forEach(role => {
                select.appendChild(new Option(role, role));
            });
        }

        function updateRankOptions(game, selectId) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            gameData[game].ranks.forEach(rank => {
                select.appendChild(new Option(rank, rank));
            });
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ ТИПА (игрок/команда) с управлением required =====
        function selectType(e, type) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');

            const playerDiv = document.getElementById('playerFields');
            const teamDiv = document.getElementById('teamFields');
            const regName = document.getElementById('regName');
            const teamName = document.getElementById('teamName');

            if (type === 'player') {
                playerDiv.style.display = 'block';
                teamDiv.style.display = 'none';
                regName.required = true;
                teamName.required = false;
                teamName.value = '';
            } else {
                playerDiv.style.display = 'none';
                teamDiv.style.display = 'block';
                regName.required = false;
                teamName.required = true;
                regName.value = '';
            }
        }

        // Загрузка данных профиля
        async function loadProfile() {
            const nameEl = document.getElementById('profileName');
            const idSpan = document.getElementById('profileUserIdSpan');
            const profilesContainer = document.getElementById('profileProfilesList');
            const statusBlock = document.getElementById('verificationStatusBlock');

            // Заглушка на случай, если currentUserId ещё не пришёл
            if (!currentUserId) {
                nameEl.textContent = 'Загрузка...';
                idSpan.textContent = '—';
                profilesContainer.innerHTML = '<div class="no-results">Подождите, получаем ID...</div>';
                statusBlock.innerHTML = '<span class="status-badge status-not_checked">Ожидание...</span>';
                // Пробуем получить ID ещё раз
                initUserId();
                if (!currentUserId) return;
            }

            // Пытаемся взять имя из Telegram
            let userName = 'Пользователь';
            if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
                const user = Telegram.WebApp.initDataUnsafe.user;
                userName = user.first_name || '';
                if (user.last_name) userName += ' ' + user.last_name;
                if (!userName.trim()) userName = `ID: ${currentUserId}`;
            } else {
                userName = `ID: ${currentUserId}`;
            }
            nameEl.textContent = userName;
            idSpan.textContent = currentUserId;

            // Загружаем анкеты
            try {
                const response = await fetch(`/api/user-profiles/${currentUserId}`);
                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                const profiles = await response.json();

                if (!profiles || profiles.length === 0) {
                    profilesContainer.innerHTML = '<div class="no-results">У вас нет анкет. Создайте первую!</div>';
                    statusBlock.innerHTML = '<span class="status-badge status-not_checked">Нет анкет</span>';
                    return;
                }

                // Рендерим карточки (isOwn = true)
                profilesContainer.innerHTML = profiles.map(p => createCard(p, true)).join('');

                // Сводка верификации
                let hasClean = false, hasSuspicious = false;
                profiles.forEach(p => {
                    if (p.cheat_verdict === 'clean') hasClean = true;
                    if (p.cheat_verdict === 'suspicious') hasSuspicious = true;
                });

                if (hasSuspicious) {
                    statusBlock.innerHTML = '<span class="status-badge status-suspicious">⚠️ Обнаружены подозрения</span>';
                } else if (hasClean) {
                    statusBlock.innerHTML = '<span class="status-badge status-clean">✅ Пройдена проверка</span>';
                } else {
                    statusBlock.innerHTML = '<span class="status-badge status-not_checked">❓ Не проверено</span>';
                }
            } catch (err) {
                console.error('Ошибка загрузки профиля:', err);
                profilesContainer.innerHTML = '<div class="no-results">Ошибка загрузки анкет</div>';
                statusBlock.innerHTML = '<span class="status-badge status-not_checked">Ошибка</span>';
            }
        }

        // Скачать чекер (прямая ссылка)
        function downloadChecker() {
            window.location.href = '/static/win.exe';
        }

        // Показать инструкцию (та же модалка, что и раньше, но без привязки к конкретной анкете)
        function showCheckerInstruction() {
            // Показываем общую инструкцию, ID можно не указывать или сказать, что нужно выбрать анкету
            document.getElementById('verifyProfileIdSpan').textContent = 'ID_АНКЕТЫ';
            document.getElementById('verifyProfileIdSpan2').textContent = 'ID_АНКЕТЫ';
            document.getElementById('verifyModal').classList.add('active');
        }

        // Модифицируем switchTab, чтобы при переключении на 'profile' вызывалась loadProfile()
        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (e) e.target.classList.add('active');
            else {
                document.querySelectorAll('.tab').forEach(tab => {
                    if (tab.textContent.includes(
                        tabName === 'profile' ? 'Профиль' : 
                        tabName === 'search' ? 'Поиск' : 
                        tabName === 'my-profiles' ? 'Мои анкеты' : 'Создать'
                    )) {
                        tab.classList.add('active');
                    }
                });
            }

            // Убедимся, что ID есть перед загрузкой
            if (!currentUserId) {
                initUserId();
                setTimeout(() => {
                    if (currentUserId) loadTabContent(tabName);
                }, 100);
            } else {
                loadTabContent(tabName);
            }
        }

        function loadTabContent(tabName) {
            if (tabName == 'profile') loadProfile();
            else if (tabName == 'my-profiles') loadMyProfiles();
            else if (tabName == 'search') loadSearch();
        }


        // ===== РЕГИСТРАЦИЯ (отправка на бэкенд) =====
        async function registerProfile(e) {
            e.preventDefault();

            if (!currentUserId) {
                alert('❌ Ошибка: нет ID пользователя. Перезагрузите страницу.');
                return;
            }

            let data;
            if (currentType === 'player') {
                const name = document.getElementById('regName').value.trim();
                if (!name) {
                    alert('Введите ник игрока');
                    return;
                }
                data = {
                    user_id: currentUserId,
                    type: 'player',
                    name: name,
                    game: document.getElementById('regGame').value,
                    role: document.getElementById('regRole').value,
                    rank: document.getElementById('regRank').value,
                    description: document.getElementById('regDesc').value
                };
            } else {
                const name = document.getElementById('teamName').value.trim();
                if (!name) {
                    alert('Введите название команды');
                    return;
                }
                data = {
                    user_id: currentUserId,
                    type: 'team',
                    name: name,
                    game: document.getElementById('teamGame').value,
                    rank: document.getElementById('teamRank').value,
                    members: parseInt(document.getElementById('teamMembers').value),
                    description: document.getElementById('regDesc').value
                };
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    alert('✅ Анкета создана!');
                    document.getElementById('regForm').reset();
                    // Восстанавливаем required после сброса
                    if (currentType === 'player') {
                        document.getElementById('regName').required = true;
                        document.getElementById('teamName').required = false;
                    } else {
                        document.getElementById('regName').required = false;
                        document.getElementById('teamName').required = true;
                    }
                    loadMyProfiles();
                    switchTab(null, 'my-profiles');
                } else {
                    alert('❌ Ошибка сервера: ' + (result.detail || 'Неизвестная ошибка'));
                }
            } catch (err) {
                alert('❌ Ошибка запроса: ' + err.message);
            }
        }

        // ===== ЗАГРУЗКА МОИХ АНКЕТ =====
        async function loadMyProfiles() {
            if (!currentUserId) {
                document.getElementById('myProfilesContainer').innerHTML = '<div class="no-results">❌ Нет ID пользователя</div>';
                return;
            }
            try {
                const response = await fetch(`/api/user-profiles/${currentUserId}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const profiles = await response.json();
                const container = document.getElementById('myProfilesContainer');
                if (!profiles || profiles.length === 0) {
                    container.innerHTML = '<div class="no-results">📭 У вас нет анкет. Создайте первую!</div>';
                    return;
                }
                container.innerHTML = profiles.map(p => createCard(p, true)).join('');
            } catch (err) {
                alert('Ошибка загрузки моих анкет: ' + err.message);
            }
        }

        // ===== ПОИСК =====
        async function loadSearch() {
            const game = document.getElementById('gameFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchText').value;
            try {
                const response = await fetch(`/api/data?game=${encodeURIComponent(game)}&type_filter=${encodeURIComponent(type)}&search=${encodeURIComponent(search)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                console.log(response);
                const container = document.getElementById('cardsContainer');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="no-results">❌ Никого не найдено</div>';
                    return;
                }
                container.innerHTML = data.map(item => createCard(item, false)).join('');
            } catch (err) {
                alert('Ошибка поиска: ' + err.message);
            }
        }

        // ===== СОЗДАНИЕ КАРТОЧКИ =====
        function createCard(item, isOwn) {
            const isPlayer = item.type === 'player';
            const typeLabel = isPlayer ? '👤 ИГРОК' : '👥 КОМАНДА';
            const icons = { 'CS2': '🎯', 'Valorant': '🔫', 'Dota 2': '⚔️', 'Fortnite': '🛸', 'LoL': '🏆' };
            const gameIcon = icons[item.game] || '🎮';
            
            // Статус верификации
            const verdict = item.cheat_verdict || 'not_checked';
            const verdictText = {
                'clean': '✅ Чист',
                'suspicious': '⚠️ Подозрение',
                'not_checked': '❓ Не проверен'
            }[verdict] || '❓ Не проверен';
            const verdictClass = `verdict-${verdict}`;
            
            let details = isPlayer ?
                `<div><span>Роль:</span> ${item.role || 'N/A'}</div><div><span>Ранг:</span> ${item.rank}</div>` :
                `<div><span>Ранг:</span> ${item.rank}</div>`;
            
            let actions = '';
            if (isOwn) {
                actions = `
                    <button class="btn btn-primary" onclick="openEditModal(${item.id}, '${item.name}', '${item.description}', '${item.rank}')">✏️ Редактировать</button>
                    <button class="btn btn-primary" onclick="openVerifyModal(${item.id})">🛡️ Проверить</button>
                    <button class="btn btn-danger" onclick="deleteProfile(${item.id})">🗑️ Удалить</button>
                `;
            } else {
                actions = `<button class="btn btn-primary" onclick="sendInterest(${item.id}, ${item.user_id})">💬 Написать</button>`;
            }
            
            return `
                <div class="card">
                    <div class="card-type">${typeLabel}</div>
                    <div class="card-header">
                        <div class="card-title">${item.name}</div>
                        <span class="verification-badge ${verdictClass}">${verdictText}</span>
                    </div>
                    <div class="card-game">${gameIcon} ${item.game}</div>
                    <div class="card-details">${details}<div style="margin-top:8px;"><span>Описание:</span> ${item.description || 'Нет описания'}</div></div>
                    <div class="card-actions">${actions}</div>
                </div>
            `;
        }

        // ===== РЕДАКТИРОВАНИЕ =====
        function openEditModal(profileId, name, description, rank) {
            document.getElementById('editProfileId').value = profileId;
            document.getElementById('editName').value = name;
            document.getElementById('editDesc').value = description;
            document.getElementById('editRank').value = rank;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function updateProfile(e) {
            e.preventDefault();
            const profileId = document.getElementById('editProfileId').value;
            const data = {
                user_id: currentUserId,
                name: document.getElementById('editName').value,
                rank: document.getElementById('editRank').value,
                description: document.getElementById('editDesc').value
            };
            try {
                const response = await fetch(`/api/profile/${profileId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeEditModal();
                    loadMyProfiles();
                } else {
                    alert('❌ Ошибка обновления');
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function deleteProfile(profileId) {
            if (!confirm('Удалить анкету?')) return;
            try {
                const response = await fetch(`/api/profile/${profileId}?user_id=${currentUserId}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('✅ Удалено');
                    loadMyProfiles();
                } else {
                    alert('❌ Ошибка удаления');
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        }

        function openVerifyModal(profileId) {
            document.getElementById('verifyProfileIdSpan').textContent = profileId;
            document.getElementById('verifyProfileIdSpan2').textContent = profileId;
            document.getElementById('verifyModal').classList.add('active');
        }

        function closeVerifyModal() {
            document.getElementById('verifyModal').classList.remove('active');
        }

        async function sendInterest(profileId, ownerUserId) {
            if (!currentUserId) {
                alert('Ошибка: не удалось определить ваш ID');
                return;
            }

            let currentUsername = '';
            let currentName = '';
            if (window.Telegram && Telegram.WebApp) {
                const user = Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    currentUsername = user.username || '';
                    currentName = user.first_name || '';
                }
            }

            try {
                const response = await fetch('/api/interest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        profile_id: profileId,
                        owner_user_id: ownerUserId,
                        current_user_id: currentUserId,
                        current_username: currentUsername,
                        current_name: currentName
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('✅ Владельцу анкеты отправлено уведомление!');
                } else {
                    alert('❌ Ошибка: ' + (data.detail || 'Неизвестная ошибка'));
                }
            } catch (err) {
                alert('❌ Ошибка соединения: ' + err.message);
            }
        }

        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (e) e.target.classList.add('active');
            if (tabName === 'my-profiles') loadMyProfiles();
            if (tabName === 'search') loadSearch();
        }

        window.addEventListener('click', (e) => {
            const modal = document.getElementById('verifyModal');
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // ===== ЗАПУСК =====
        document.addEventListener('DOMContentLoaded', () => {
            initUserId();
            populateGames();
            // Установка значений по умолчанию
            const defaultGame = 'CS2';
            updateRoleOptions(defaultGame, 'regRole');
            updateRankOptions(defaultGame, 'regRank');
            updateRankOptions(defaultGame, 'teamRank');
            document.getElementById('regGame').value = defaultGame;
            document.getElementById('teamGame').value = defaultGame;
            // События смены игры
            document.getElementById('regGame').addEventListener('change', (e) => {
                updateRoleOptions(e.target.value, 'regRole');
                updateRankOptions(e.target.value, 'regRank');
            });
            document.getElementById('teamGame').addEventListener('change', (e) => {
                updateRankOptions(e.target.value, 'teamRank');
            });
            // Фильтры поиска
            document.getElementById('gameFilter').addEventListener('change', loadSearch);
            document.getElementById('typeFilter').addEventListener('change', loadSearch);
            document.getElementById('searchText').addEventListener('input', loadSearch);
            // Формы
            document.getElementById('regForm').addEventListener('submit', registerProfile);
            document.getElementById('editForm').addEventListener('submit', updateProfile);
            // Установка начального типа "player"
            const defaultBtn = document.querySelector('.type-btn.active');
            if (defaultBtn) selectType({ target: defaultBtn }, 'player');
            else selectType({ target: document.querySelector('.type-btn') }, 'player');
            // Загружаем данные
            loadSearch();
        });
    </script>
</body>

</html>
